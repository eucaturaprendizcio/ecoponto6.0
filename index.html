<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPonto - Painel de Autenticação</title>
    <link rel="icon" href="logo-ecoponto2.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --neon-green: #00ff66;
            --neon-glow: rgba(0, 255, 102, 0.2);
            --glass-bg: rgba(4, 18, 10, 0.6);
            --glass-border: rgba(0, 255, 102, 0.18);
            --text-main: #e6f9ed;
            --text-dim: #7da68a;
            --bg-input: rgba(1, 10, 5, 0.8);
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* VIDEO BACKGROUND - INTEGRALMENTE PRESERVADO */
        .bg-video-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-video-container video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.55) contrast(1.1) saturate(1.0);
        }

        /* overlay estilo matrix */
        .bg-video-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(10, 16, 10, 0) 50%, rgba(0, 0, 0, 0.35) 50%),
                linear-gradient(90deg, rgba(0, 255, 102, 0.03), rgba(0, 0, 0, 0.15), rgba(0, 255, 102, 0.03));
            background-size: 100% 4px, 6px 100%;
            opacity: 0.45;
        }

        /* LOGIN BOX (IMPLEMENTADO GLASSMORPHISM E DESIGN NASA COGNITIVO) */
        .login-box {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.75), inset 0 0 30px rgba(0, 255, 102, 0.03);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: panelFadeIn 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Cantoneiras táticas estilo NASA */
        .login-box::before,
        .login-box::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border: 2px solid var(--neon-green);
        }

        .login-box::before {
            top: -1px;
            left: -1px;
            border-right: 0;
            border-bottom: 0;
            border-top-left-radius: 4px;
        }

        .login-box::after {
            bottom: -1px;
            right: -1px;
            border-left: 0;
            border-top: 0;
            border-bottom-right-radius: 4px;
        }

        .logo-container img {
            max-width: 200px;
            margin-bottom: 20px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
        }

        /* TABS (MELHORIA DE LEITURA E TRANSIÇÃO) */
        .login-tabs {
            display: flex;
            margin-bottom: 25px;
            gap: 5px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 102, 0.15);
            border-radius: 6px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 12px;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .tab-btn.active {
            background: var(--neon-green);
            color: #010a04;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.3);
        }

        .tab-btn:not(.active):hover {
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-glow);
        }

        /* CONTEÚDO DOS FORMULÁRIOS COM SLIDE ANIMADO */
        .form-content {
            display: none;
            opacity: 0;
        }

        .form-content.active {
            display: block;
            animation: formSlice 0.4s ease-out forwards;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 7px;
            padding-left: 4px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid rgba(0, 255, 102, 0.15);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 14px var(--neon-glow);
            background: rgba(1, 15, 7, 0.95);
        }

        /* BOTÃO DE ACESSO DINÂMICO */
        .btn-access {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #009933, #00ff66);
            border: none;
            border-radius: 6px;
            color: #010a04;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 18px rgba(0, 255, 102, 0.3);
            margin-top: 10px;
        }

        .btn-access:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(0, 255, 102, 0.5);
            filter: brightness(1.15);
        }

        /* SOLICITAR ACESSO */
        .actions {
            margin-top: 28px;
        }

        .btn-request {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.8px;
            transition: all 0.2s ease;
            display: inline-block;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }

        .btn-request:hover {
            color: var(--neon-green);
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.3);
            border-color: var(--neon-green);
        }

        /* CHAVES DE ANIMAÇÃO */
        @keyframes panelFadeIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(15px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes formSlice {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="bg-video-container">
        <video autoplay muted loop playsinline>
            <source src="videoplayback.mp4" type="video/mp4">
        </video>
    </div>

    <div class="login-box">
        <div class="logo-container">
            <img src="logo-ecoponto.png" alt="EcoPonto">
        </div>

        <div class="login-tabs">
            <button class="tab-btn active" onclick="switchTab('corporate')">Portal Corporativo</button>
            <button class="tab-btn" onclick="switchTab('operational')">Portal do Motorista</button>
        </div>

        <div id="corporateForm" class="form-content active">
            <form onsubmit="handleLogin(event, 'Corporativo')">
                <div class="input-group">
                    <label for="corpUser">Usuário</label>
                    <input type="text" id="corpUser" autocomplete="off" placeholder="Insira seu usuário" required>
                </div>
                <div class="input-group">
                    <label for="corpPass">Senha</label>
                    <input type="password" id="corpPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-access">Acessar</button>
            </form>
        </div>

        <div id="operationalForm" class="form-content">
            <form onsubmit="handleLogin(event, 'Operacional')">
                <div class="input-group">
                    <label for="opUnit">Acesso [Primeiro Nome + Último Nome]</label>
                    <input type="text" id="opUnit" autocomplete="off" placeholder="JORGENOGUEIRA" required>
                </div>
                <div class="input-group">
                    <label for="opKey">Matrícula</label>
                    <input type="password" id="opKey" placeholder="9-000000" required>
                </div>
                <button type="submit" class="btn-access">Iniciar Operação</button>
            </form>
        </div>

        <div class="actions">
            <a href="#" class="btn-request" id="lnkRequest">Solicitar Novo Acesso</a>
        </div>
    </div>

    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));

            if (type === 'corporate') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('corporateForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('operationalForm').classList.add('active');
            }
        }

        function handleLogin(event, tipoContexto) {
            event.preventDefault();
            const btn = event.submitter;

            // Transforma o botão visualmente em estado de carregamento/autenticação tática
            const originalText = btn.innerText;
            btn.innerText = "AUTENTICANDO AO SISTEMA...";
            btn.style.background = "#021408";
            btn.style.color = "#00ff66";
            btn.style.border = "1px solid #00ff66";
            btn.style.cursor = "not-allowed";
            btn.disabled = true;

            console.log(`Tentativa de login no ambiente: ${tipoContexto}`);

            // Simulação de resposta de rede
            setTimeout(() => {
                alert(`Conexão estabelecida! Ambiente ${tipoContexto} carregado com sucesso.`);
                btn.innerText = originalText;
                btn.disabled = false;
                btn.style = "";
            }, 1500);
        }

        document.getElementById('lnkRequest').addEventListener('click', function (e) {
            e.preventDefault();
            alert('Redirecionando ao formulário de solicitação de acesso corporativo...');
        });
    </script>

</body>
</html>
